name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint – format check and ESLint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # Typecheck – TypeScript compilation without emitting output
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  # ──────────────────────────────────────────────────────────────────────────
  # Unit tests – no external services required
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: test-results/unit.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # Integration tests – requires PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_circle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nova_circle_test
      APPLICATIONINSIGHTS_CONNECTION_STRING: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run integration tests
        run: npm run test:integration -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: test-results/integration.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # API tests – requires PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_circle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nova_circle_test
      APPLICATIONINSIGHTS_CONNECTION_STRING: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run API tests
        run: npm run test:api -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/api.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test-results/api.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # Authorization and privacy regression tests – policy and auth unit tests
  # These are a subset of unit tests focused on access-control correctness.
  # Running them as a dedicated required check ensures auth/privacy regressions
  # are immediately visible and cannot be obscured by unrelated test failures.
  # ──────────────────────────────────────────────────────────────────────────
  auth-privacy-tests:
    name: auth-privacy-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run authorization and privacy unit tests
        run: npm run test:unit -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/auth-privacy.xml policy auth-middleware

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-auth-privacy
          path: test-results/auth-privacy.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # Migration check – verifies the full migration sequence runs cleanly
  # against a fresh database. Catches broken migrations before they reach
  # integration or API tests and blocks any schema change that cannot be
  # applied to an empty schema.
  # ──────────────────────────────────────────────────────────────────────────
  migration-check:
    name: migration-check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_circle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nova_circle_test
      APPLICATIONINSIGHTS_CONNECTION_STRING: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply all migrations from scratch
        run: npm run migrate

      - name: Verify expected tables exist
        run: |
          for TABLE in user_profiles groups group_members events event_invitations audit_log; do
            RESULT=$(PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d nova_circle_test -t -c \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='${TABLE}';")
            if [ "$(echo $RESULT | tr -d ' ')" != "1" ]; then
              echo "ERROR: Table '${TABLE}' is missing after migrations"
              exit 1
            fi
          done
          echo "All expected tables verified: user_profiles, groups, group_members, events, event_invitations, audit_log"

  # ──────────────────────────────────────────────────────────────────────────
  # Build – validates that TypeScript compiles cleanly
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Client container build – builds client/Dockerfile and smoke-tests that
  # the nginx container serves a valid response on GET /.
  # Catches broken Vite builds, missing assets, or nginx config errors before
  # they reach the CD pipeline.
  # ──────────────────────────────────────────────────────────────────────────
  client-container-build:
    name: client-container-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build client Docker image
        run: docker build --tag nova-circle-client:ci client/

      - name: Start client container
        run: docker run -d --name nova-circle-client-ci -p 8080:80 nova-circle-client:ci

      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 10); do
            if curl --silent --fail --connect-timeout 2 --max-time 5 http://localhost:8080/ > /dev/null; then
              echo "Container is ready"
              exit 0
            fi
            echo "Attempt $i: container not ready yet, waiting 2 s..."
            sleep 2
          done
          echo "ERROR: Container did not become ready in time"
          docker logs nova-circle-client-ci
          exit 1

      - name: Smoke test – GET / returns 200
        run: curl --fail --connect-timeout 5 --max-time 10 http://localhost:8080/

      - name: Stop and remove container
        if: always()
        run: docker rm -f nova-circle-client-ci || true

  # ──────────────────────────────────────────────────────────────────────────
  # Client – lint, typecheck, and tests for the web client (M7 UI polish)
  # ──────────────────────────────────────────────────────────────────────────
  client:
    name: Client (UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/client.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-client
          path: client/test-results/client.xml
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # E2E tests – Playwright browser automation.
  #
  # This job is permanently disabled in CI (if: false).
  # Playwright E2E now runs exclusively in the CD pipeline as the blue/green
  # pre-promotion gate — see .github/workflows/cd.yml Phase 5.
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    if: false  # Playwright E2E now runs in the CD pipeline as a blue/green deployment gate
    needs: client
    defaults:
      run:
        working-directory: client
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL }}
      PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Validate required variables
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "ERROR: PLAYWRIGHT_BASE_URL is not set."
            echo "Set vars.PLAYWRIGHT_BASE_URL in GitHub Actions to the URL of the running client."
            exit 1
          fi
          echo "PLAYWRIGHT_BASE_URL=${PLAYWRIGHT_BASE_URL}"

      # Decode the pre-authenticated Playwright storage state when available.
      # This is the preferred approach for tenants that enforce MFA or
      # Conditional Access Policies that block headless sign-ins from CI runners.
      # When the secret is absent the step is a no-op and global-setup falls
      # back to the headless username/password path.
      - name: Restore pre-authenticated Playwright state
        env:
          PLAYWRIGHT_AUTH_STATE_B64: ${{ secrets.PLAYWRIGHT_AUTH_STATE_B64 }}
        run: |
          if [ -n "$PLAYWRIGHT_AUTH_STATE_B64" ]; then
            mkdir -p e2e/.auth
            printf '%s' "$PLAYWRIGHT_AUTH_STATE_B64" | base64 -d > e2e/.auth/injected.json
            echo "PLAYWRIGHT_AUTH_STATE_FILE=${{ github.workspace }}/client/e2e/.auth/injected.json" >> "$GITHUB_ENV"
            echo "Pre-authenticated state restored – headless sign-in will be skipped."
          else
            echo "PLAYWRIGHT_AUTH_STATE_B64 not set – will attempt headless sign-in."
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: client/test-results/e2e.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: client/test-results/**/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: client/test-results/**/*.zip
          retention-days: 7
          if-no-files-found: ignore
