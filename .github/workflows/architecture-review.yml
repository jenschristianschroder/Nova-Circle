# ──────────────────────────────────────────────────────────────────────────
# Daily Architecture & Design Principles Review
#
# Runs every morning at 03:00 UTC. Reviews the codebase module-by-module
# against copilot-instructions.md design principles using batched LLM
# calls that stay within GitHub Models token limits.
#
# Prerequisites:
#   1. A GitHub PAT with "models" permission stored as LLM_API_KEY.
#   2. Optionally set LLM_ENDPOINT and LLM_MODEL as repository variables.
# ──────────────────────────────────────────────────────────────────────────

name: Daily Architecture Review

on:
  schedule:
    - cron: '0 3 * * *'    # Every day at 03:00 UTC
  workflow_dispatch:         # Allow manual trigger for testing

permissions:
  contents: read
  issues: write

env:
  LLM_ENDPOINT: ${{ vars.LLM_ENDPOINT || 'https://models.inference.ai.azure.com/chat/completions' }}
  LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o' }}
  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
  MAX_ISSUES: '10'

jobs:
  review:
    name: Architecture review
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Collect codebase & run batched review ───────────────────────
      - name: Run batched LLM architecture review
        id: llm_review
        run: |
          set -euo pipefail

          python3 << 'PYEOF'
          import json, os, subprocess, sys, time, glob

          LLM_ENDPOINT = os.environ["LLM_ENDPOINT"]
          LLM_MODEL = os.environ["LLM_MODEL"]
          LLM_API_KEY = os.environ["LLM_API_KEY"]

          # ── Token budget ───────────────────────────────────────────────
          # GitHub Models gpt-4o limit: ~8k input tokens ≈ ~24k chars
          # We reserve ~2k tokens for system prompt ≈ ~6k chars
          # That leaves ~6k tokens ≈ ~18k chars for user content
          # We further split: ~4k chars for principles summary, ~14k for code
          MAX_PRINCIPLES_CHARS = 4000
          MAX_CODE_CHARS_PER_BATCH = 14000
          MAX_FILE_CHARS = 2000        # Per-file truncation
          MAX_OUTPUT_TOKENS = 2000
          DELAY_BETWEEN_CALLS = 7      # GitHub Models: 10 req/min

          # ── Load design principles (condensed) ─────────────────────────
          principles_full = ""
          if os.path.exists(".github/copilot-instructions.md"):
              with open(".github/copilot-instructions.md", "r") as f:
                  principles_full = f.read()

          # Condense principles to fit token budget — keep section headers
          # and key rules, drop verbose examples
          def condense_principles(text: str, max_chars: int) -> str:
              if len(text) <= max_chars:
                  return text
              lines = text.split("\n")
              condensed = []
              chars = 0
              for line in lines:
                  # Prioritize: headers, bullet points, numbered items
                  stripped = line.strip()
                  if not stripped:
                      continue
                  if stripped.startswith("#") or stripped.startswith("-") or stripped.startswith("*") or (len(stripped) > 1 and stripped[0].isdigit() and stripped[1] in ".)"):
                      if chars + len(line) + 1 > max_chars:
                          condensed.append("[PRINCIPLES TRUNCATED — review covers key rules]")
                          break
                      condensed.append(line)
                      chars += len(line) + 1
              return "\n".join(condensed)

          principles = condense_principles(principles_full, MAX_PRINCIPLES_CHARS)
          print(f"Principles: {len(principles_full)} chars -> condensed to {len(principles)} chars")

          # ── Compact system prompt ──────────────────────────────────────
          SYSTEM_PROMPT = (
              "You are a senior architect reviewing TypeScript code against design principles.\n"
              "Report ONLY genuine, specific violations in the provided code files.\n"
              "Do NOT report missing features, unimplemented modules, or test files.\n"
              "Do NOT fabricate findings. If compliant, return [].\n"
              "For each finding return: title (max 80 chars), file, description, "
              "principle_violated, suggested_fix, severity (critical|high|medium|low).\n"
              "Return ONLY a JSON array. No markdown, no extra text."
          )

          # ── Discover source files by module ────────────────────────────
          modules = {}
          for ts_file in sorted(glob.glob("src/**/*.ts", recursive=True)):
              if ".test." in ts_file or ".spec." in ts_file:
                  continue
              if "/node_modules/" in ts_file or "/dist/" in ts_file:
                  continue
              # Group by module: src/modules/<name>/... -> module name
              parts = ts_file.split("/")
              if len(parts) >= 3 and parts[1] == "modules":
                  module_name = parts[2]
              else:
                  module_name = "_shared"
              modules.setdefault(module_name, []).append(ts_file)

          # Also include migrations as a pseudo-module
          migration_files = sorted(glob.glob("db/migrations/*.ts"))
          if migration_files:
              modules["_migrations"] = migration_files

          print(f"Discovered {sum(len(v) for v in modules.values())} files across {len(modules)} modules: {list(modules.keys())}")

          # ── Build batches that fit within token budget ──────────────────
          def build_batches(file_list, max_chars):
              """Group files into batches that fit within max_chars."""
              batches = []
              current_batch = []
              current_chars = 0
              for filepath in file_list:
                  try:
                      with open(filepath, "r") as f:
                          content = f.read()[:MAX_FILE_CHARS]
                  except Exception:
                      continue
                  entry = f"\n--- FILE: {filepath} ---\n{content}\n"
                  entry_len = len(entry)
                  if current_chars + entry_len > max_chars and current_batch:
                      batches.append(current_batch)
                      current_batch = []
                      current_chars = 0
                  current_batch.append(entry)
                  current_chars += entry_len
              if current_batch:
                  batches.append(current_batch)
              return batches

          # ── Call LLM for each batch ────────────────────────────────────
          all_findings = []
          call_count = 0

          for module_name, file_list in modules.items():
              batches = build_batches(file_list, MAX_CODE_CHARS_PER_BATCH)
              for batch_idx, batch_entries in enumerate(batches):
                  code_snapshot = "".join(batch_entries)
                  user_content = (
                      f"## DESIGN PRINCIPLES (condensed)\n\n{principles}\n\n"
                      f"## CODE FILES (module: {module_name}, batch {batch_idx + 1}/{len(batches)})\n\n"
                      f"{code_snapshot}"
                  )

                  payload = {
                      "model": LLM_MODEL,
                      "temperature": 0.2,
                      "max_tokens": MAX_OUTPUT_TOKENS,
                      "messages": [
                          {"role": "system", "content": SYSTEM_PROMPT},
                          {"role": "user", "content": user_content},
                      ],
                  }

                  # Check total payload size (~4 chars per token is a rough estimate)
                  payload_json = json.dumps(payload)
                  estimated_tokens = len(payload_json) // 4
                  print(f"  [{module_name} batch {batch_idx+1}/{len(batches)}] "
                        f"{len(batch_entries)} files, ~{estimated_tokens} est. tokens, "
                        f"{len(payload_json)} chars")

                  # If still too large, skip with a warning
                  if len(payload_json) > 28000:  # ~7k tokens safety margin
                      print(f"  ⚠️  Batch too large ({len(payload_json)} chars), skipping")
                      continue

                  # Rate limit: wait between calls
                  if call_count > 0:
                      time.sleep(DELAY_BETWEEN_CALLS)

                  # Write payload and call via curl (handles auth headers cleanly)
                  with open("/tmp/request.json", "w") as f:
                      json.dump(payload, f)

                  result = subprocess.run(
                      [
                          "curl", "-s", "-w", "\n%{http_code}",
                          "-X", "POST", LLM_ENDPOINT,
                          "-H", "Content-Type: application/json",
                          "-H", f"Authorization: Bearer {LLM_API_KEY}",
                          "-H", f"api-key: {LLM_API_KEY}",
                          "-d", "@/tmp/request.json",
                      ],
                      capture_output=True, text=True,
                  )

                  call_count += 1
                  lines = result.stdout.strip().rsplit("\n", 1)
                  if len(lines) != 2:
                      print(f"  ���️  Unexpected curl output, skipping batch")
                      continue

                  body, http_code = lines[0], lines[1].strip()

                  if http_code != "200":
                      print(f"  ⚠️  HTTP {http_code} for {module_name} batch {batch_idx+1}, skipping")
                      print(f"     {body[:300]}")
                      # If rate limited, wait longer
                      if http_code in ("429", "413"):
                          time.sleep(15)
                      continue

                  # Parse response
                  try:
                      resp = json.loads(body)
                      content = resp.get("choices", [{}])[0].get("message", {}).get("content", "[]")
                      content = content.strip()
                      if content.startswith("```"):
                          content = "\n".join(content.split("\n")[1:])
                      if content.endswith("```"):
                          content = content[:-3].strip()
                      findings = json.loads(content)
                      if isinstance(findings, list):
                          all_findings.extend(findings)
                          print(f"  ✅ {len(findings)} findings")
                      else:
                          print(f"  ⚠️  Response was not a list, skipping")
                  except (json.JSONDecodeError, KeyError, IndexError) as e:
                      print(f"  ⚠️  Failed to parse response: {e}")
                      continue

          # ── Deduplicate findings by title ──────────────────────────────
          seen_titles = set()
          unique_findings = []
          for f in all_findings:
              title_key = f.get("title", "").lower().strip()
              if title_key and title_key not in seen_titles:
                  seen_titles.add(title_key)
                  unique_findings.append(f)

          # Sort by severity
          severity_order = {"critical": 0, "high": 1, "medium": 2, "low": 3}
          unique_findings.sort(key=lambda f: severity_order.get(f.get("severity", "low"), 4))

          with open("/tmp/findings.json", "w") as f:
              json.dump(unique_findings, f, indent=2)

          print(f"\n📊 Total: {len(all_findings)} raw findings -> {len(unique_findings)} unique findings across {call_count} API calls")
          PYEOF

      # ── 3. Create GitHub issues for findings ───────────────────────────
      - name: Create issues for findings
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('/tmp/findings.json', 'utf8'));
            const maxIssues = parseInt(process.env.MAX_ISSUES || '10');
            const today = new Date().toISOString().split('T')[0];

            if (findings.length === 0) {
              console.log('✅ No architecture violations found. Codebase is compliant.');
              return;
            }

            // Check for existing open issues to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'architecture-review',
              per_page: 100,
            });

            const existingTitles = new Set(
              existingIssues.data.map(i => i.title.toLowerCase())
            );

            let created = 0;

            for (const finding of findings.slice(0, maxIssues)) {
              const proposedTitle = `[arch-review] ${finding.title}`;
              if (existingTitles.has(proposedTitle.toLowerCase())) {
                console.log(`⏭️  Skipping duplicate: ${proposedTitle}`);
                continue;
              }

              const severityEmoji = {
                critical: '🔴',
                high: '🟠',
                medium: '🟡',
                low: '🔵',
              }[finding.severity] || '⚪';

              const body = [
                `## ${severityEmoji} Architecture Review Finding`,
                '',
                `**Severity:** ${finding.severity}`,
                `**File:** \`${finding.file}\``,
                `**Review date:** ${today}`,
                '',
                '### Description',
                finding.description,
                '',
                '### Principle Violated',
                `> ${finding.principle_violated}`,
                '',
                '### Suggested Fix',
                finding.suggested_fix,
                '',
                '---',
                '*This issue was automatically created by the daily architecture review workflow.*',
                '*Source: `.github/copilot-instructions.md` design principles.*',
              ].join('\n');

              try {
                const issue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: proposedTitle,
                  body: body,
                  labels: [
                    'architecture-review',
                    `severity:${finding.severity}`,
                    'automated',
                  ],
                });
                console.log(`✅ Created issue #${issue.data.number}: ${proposedTitle}`);
                created++;
              } catch (err) {
                console.log(`::warning::Failed to create issue: ${err.message}`);
              }
            }

            console.log(`\n📊 Summary: ${created} issues created, ${findings.length - created} skipped (duplicates or errors)`);

      # ── 4. Summary ─────────────────────────────────────────────────────
      - name: Post summary
        if: always()
        run: |
          if [ -f /tmp/findings.json ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/findings.json'))))")
            echo "### 🏗️ Architecture Review Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Findings:** ${COUNT}" >> $GITHUB_STEP_SUMMARY
            echo "- **Max issues per run:** ${{ env.MAX_ISSUES }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Review date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Architecture Review" >> $GITHUB_STEP_SUMMARY
            echo "Review did not complete successfully." >> $GITHUB_STEP_SUMMARY
          fi
