name: CD

# Runs after the CI workflow passes on the main or dev branch.
# Only deploys when every CI gate (lint, typecheck, all tests, migration-check,
# build) has succeeded.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, dev]

# OIDC: request a short-lived Azure token — no static service-principal secrets.
permissions:
  id-token: write
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build and push both Docker images to Azure Container Registry.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and push images
    # Skip if CI failed or was cancelled.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      # Check out the exact commit that passed CI to ensure images are built
      # from the same source tree that was tested — not a later commit.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag (full commit SHA for traceability)
        id: set-tag
        run: echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      # Authenticate to Azure using OIDC federated credentials.
      # No secrets required — only the three repository variables listed below.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # az acr login uses the already-authenticated Azure CLI identity.
      - name: Login to Azure Container Registry
        run: |
          REGISTRY_LOGIN_SERVER="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          REGISTRY_NAME="${REGISTRY_LOGIN_SERVER%%.*}"
          az acr login --name "$REGISTRY_NAME"

      - name: Build and push backend image
        run: |
          REGISTRY="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          TAG="${{ steps.set-tag.outputs.tag }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Sanitise branch name: replace characters invalid in Docker tags with hyphens.
          SAFE_BRANCH="${BRANCH//[^a-zA-Z0-9._-]/-}"
          MOVING_TAG="latest-${SAFE_BRANCH}"
          docker build \
            --tag "${REGISTRY}/nova-circle-api:${TAG}" \
            --tag "${REGISTRY}/nova-circle-api:${MOVING_TAG}" \
            .
          docker push "${REGISTRY}/nova-circle-api:${TAG}"
          docker push "${REGISTRY}/nova-circle-api:${MOVING_TAG}"
          # Only overwrite :latest from main so dev builds don't clobber main artifacts.
          if [[ "${BRANCH}" == "main" ]]; then
            docker tag "${REGISTRY}/nova-circle-api:${TAG}" "${REGISTRY}/nova-circle-api:latest"
            docker push "${REGISTRY}/nova-circle-api:latest"
          fi

      - name: Build and push frontend image
        run: |
          REGISTRY="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          TAG="${{ steps.set-tag.outputs.tag }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Sanitise branch name: replace characters invalid in Docker tags with hyphens.
          SAFE_BRANCH="${BRANCH//[^a-zA-Z0-9._-]/-}"
          MOVING_TAG="latest-${SAFE_BRANCH}"
          docker build \
            --tag "${REGISTRY}/nova-circle-client:${TAG}" \
            --tag "${REGISTRY}/nova-circle-client:${MOVING_TAG}" \
            client/
          docker push "${REGISTRY}/nova-circle-client:${TAG}"
          docker push "${REGISTRY}/nova-circle-client:${MOVING_TAG}"
          # Only overwrite :latest from main so dev builds don't clobber main artifacts.
          if [[ "${BRANCH}" == "main" ]]; then
            docker tag "${REGISTRY}/nova-circle-client:${TAG}" "${REGISTRY}/nova-circle-client:latest"
            docker push "${REGISTRY}/nova-circle-client:latest"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy infrastructure, run migrations, then perform a blue/green revision
  # swap gated by remote API tests and Playwright E2E tests:
  #
  #   1. Deploy Bicep with the CURRENT image (no new revision yet).
  #   2. Run DB migrations against the updated schema.
  #   3. Create a NEW API revision (0 % traffic), wait for it to start.
  #   4. Smoke-test the new API revision via its revision-specific URL.
  #   4.5 Run direct API tests against the new API revision URL.
  #   5. Create a NEW frontend revision with API_BASE_URL pointing to the new
  #      API revision URL — ensuring E2E tests exercise the new code end-to-end.
  #   6. Run Playwright E2E tests against the new frontend revision's
  #      revision-specific URL — old revisions continue to serve 100 % of
  #      live traffic throughout so users are never exposed to the candidate.
  #   7a. Both gates pass → shift 100 % traffic to new revisions, deactivate old.
  #   7b. Either gate fails → deactivate the new revisions (no traffic restore
  #       needed — live traffic was never moved) and fail the job.
  #
  # Protected by the `production` GitHub environment (requires a reviewer).
  #
  # Required secrets (production environment):
  #   POSTGRES_ADMIN_PASSWORD        – PostgreSQL admin password for migrations
  #   PLAYWRIGHT_AUTH_STATE_B64      – base64-encoded Playwright storage state
  #                                    (preferred; avoids MFA / Conditional Access)
  #   PLAYWRIGHT_TEST_USER_EMAIL     – fallback headless sign-in email
  #   PLAYWRIGHT_TEST_USER_PASSWORD  – fallback headless sign-in password
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    # Prevent concurrent deploys from racing on SPA redirect URI read-modify-write.
    # cancel-in-progress: false so a queued deploy is not discarded — it waits.
    concurrency:
      group: deploy-${{ vars.AZURE_ENVIRONMENT_NAME }}
      cancel-in-progress: false

    steps:
      # Check out the same commit that was built and tested.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Phase 1: Deploy infrastructure with the CURRENT image ──────────────
      # Keep the currently running images while infra resources are updated.
      # This prevents a new (un-migrated) revision from going live before
      # migrations have run.
      - name: Get current Container App image
        id: current-image
        run: |
          CURRENT=$(az containerapp show \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" \
            --output tsv 2>/dev/null \
            || echo "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest")
          echo "image=${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: Get current frontend Container App image
        id: current-frontend-image
        run: |
          CURRENT=$(az containerapp show \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" \
            --output tsv 2>/dev/null \
            || echo "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest")
          echo "image=${CURRENT}" >> "$GITHUB_OUTPUT"

      # Update all Azure infrastructure (networking, DB, Container App env, etc.)
      # but keep both Container Apps on their current images so no new revision
      # starts against the old schema.  The Bicep templates set
      # activeRevisionsMode: 'Multiple' so subsequent revision operations work.
      - name: Deploy infrastructure (Bicep)
        env:
          # main.bicepparam uses readEnvironmentVariable() which is evaluated at
          # Bicep compile time (before --parameters CLI overrides take effect).
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          POSTGRES_FQDN=$(az deployment group create \
            --name "nova-circle-${{ github.run_id }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters \
              containerImage="${{ steps.current-image.outputs.image }}" \
              frontendContainerImage="${{ steps.current-frontend-image.outputs.image }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              azureTenantId="${{ vars.API_AZURE_TENANT_ID }}" \
              azureClientId="${{ vars.API_AZURE_CLIENT_ID }}" \
              corsOrigin="${{ vars.CORS_ORIGIN }}" \
              frontendAzureClientId="${{ vars.API_AZURE_CLIENT_ID }}" \
              frontendAzureTenantId="${{ vars.API_AZURE_TENANT_ID }}" \
            --query "properties.outputs.postgresFqdn.value" \
            --output tsv)
          echo "postgres_fqdn=${POSTGRES_FQDN}" >> "$GITHUB_ENV"

      # ── Phase 2: Run DB migrations ─────────────────────────────────────────
      # Run Knex migrations directly from the workflow runner.
      # A temporary PostgreSQL firewall rule is opened for the runner's IP,
      # then removed after migrations complete (or if any step fails).
      - name: Allow runner IP in PostgreSQL firewall
        run: |
          RUNNER_IP=$(curl -s --max-time 10 https://api.ipify.org \
            || curl -s --max-time 10 https://ifconfig.me)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_ENV"
          az postgres flexible-server firewall-rule create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "psql-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --rule-name "gh-actions-runner" \
            --start-ip-address "${RUNNER_IP}" \
            --end-ip-address "${RUNNER_IP}" \
            --output none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          NODE_ENV: production
        run: |
          if [[ -z "${POSTGRES_ADMIN_PASSWORD}" ]]; then
            echo "::error::POSTGRES_ADMIN_PASSWORD secret is not set or is empty"
            exit 1
          fi
          # URL-encode the password so special characters don't break the
          # connection string passed to pg's URL parser (new URL()).
          # Read from env (not sys.argv) so the secret is never on the process command line.
          ENCODED_PW=$(python3 -c \
            "import urllib.parse, os; print(urllib.parse.quote(os.environ['POSTGRES_ADMIN_PASSWORD'], safe=''))")
          # Mask the encoded form so it is not visible in logs.
          echo "::add-mask::${ENCODED_PW}"
          DATABASE_URL="postgresql://ncadmin:${ENCODED_PW}@${postgres_fqdn}:5432/nova_circle?sslmode=require"
          echo "::add-mask::${DATABASE_URL}"
          export DATABASE_URL
          npm run migrate

      - name: Remove runner IP from PostgreSQL firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "psql-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --rule-name "gh-actions-runner" \
            --yes --output none || true

      # ── Phase 3: Create new revisions with 0 % traffic ────────────────────
      # Record the revision currently receiving live traffic so it can be
      # deactivated after a successful E2E gate (promote path).
      #
      # Primary query: look for a traffic entry with weight > 0 that has an
      # explicit revisionName (set after a prior CD promote).
      #
      # Fallback: when Bicep deploys without explicit traffic rules, Azure
      # Container Apps uses { latestRevision: true } which has no revisionName
      # property.  In that case the primary query returns empty, so we fall
      # back to the Container App's latestReadyRevisionName which identifies
      # the revision that latestRevision: true resolves to.
      - name: Record old revision names
        id: old-revisions
        run: |
          APP_API="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          APP_CLIENT="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"

          OLD_API=$(az containerapp show \
            --name "${APP_API}" --resource-group "${RG}" \
            --query 'properties.configuration.ingress.traffic[?weight>`0`].revisionName | [0]' \
            --output tsv)
          if [ -z "${OLD_API}" ]; then
            OLD_API=$(az containerapp show \
              --name "${APP_API}" --resource-group "${RG}" \
              --query 'properties.latestReadyRevisionName' \
              --output tsv)
          fi

          OLD_CLIENT=$(az containerapp show \
            --name "${APP_CLIENT}" --resource-group "${RG}" \
            --query 'properties.configuration.ingress.traffic[?weight>`0`].revisionName | [0]' \
            --output tsv)
          if [ -z "${OLD_CLIENT}" ]; then
            OLD_CLIENT=$(az containerapp show \
              --name "${APP_CLIENT}" --resource-group "${RG}" \
              --query 'properties.latestReadyRevisionName' \
              --output tsv)
          fi

          echo "Old API revision:      ${OLD_API}"
          echo "Old frontend revision: ${OLD_CLIENT}"
          echo "api=${OLD_API}"       >> "$GITHUB_OUTPUT"
          echo "client=${OLD_CLIENT}" >> "$GITHUB_OUTPUT"

      # Build a short, ACA-compatible revision suffix:
      # - lowercase alphanumeric, max 10 chars, must start with a letter.
      # - Format: 'r' + first 7 hex chars of the commit SHA + 2-char hex of
      #   the run attempt (wraps at 256).  The run-attempt component ensures
      #   uniqueness when the workflow is re-run for the same commit SHA.
      - name: Compute revision suffix
        id: rev-suffix
        run: |
          BASE_SHA_PART=$(echo '${{ needs.build-and-push.outputs.image-tag }}' | cut -c1-7 | tr '[:upper:]' '[:lower:]')
          ATTEMPT_NUMBER=${GITHUB_RUN_ATTEMPT:-1}
          ATTEMPT_MOD=$(( (ATTEMPT_NUMBER - 1) % 256 ))
          ATTEMPT_HEX=$(printf '%02x' "${ATTEMPT_MOD}")
          SUFFIX="r${BASE_SHA_PART}${ATTEMPT_HEX}"
          echo "Computed revision suffix: ${SUFFIX}"
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"

      # Configure the managed-identity ACR pull credential before updating the
      # image.  When the Bicep deployment ran with the MCR placeholder image
      # (useAcr=false) it writes registries:[] which clears any existing
      # credential; this step restores it so the image pull succeeds.
      - name: Configure ACR pull credential — API
        run: |
          az containerapp registry set \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}" \
            --identity "system" \
            --output none

      - name: Configure ACR pull credential — frontend
        run: |
          az containerapp registry set \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}" \
            --identity "system" \
            --output none

      # Create the new API revision first.  Because activeRevisionsMode is
      # 'Multiple' (set in Bicep), each update creates a revision with 0 %
      # traffic weight so the old revision continues to serve all live traffic.
      # The frontend revision is created later, after the new API URL is known.
      - name: Create new API revision
        id: new-api-revision
        run: |
          SUFFIX="${{ steps.rev-suffix.outputs.suffix }}"
          APP="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          az containerapp update \
            --name "${APP}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}/nova-circle-api:${{ needs.build-and-push.outputs.image-tag }}" \
            --revision-suffix "${SUFFIX}" \
            --output none
          echo "revision=${APP}--${SUFFIX}" >> "$GITHUB_OUTPUT"

      # Poll until the new API revision reports 'Running' before deriving its
      # URL and creating the frontend revision that must proxy to it.
      - name: Wait for new API revision to be running
        run: |
          REV="${{ steps.new-api-revision.outputs.revision }}"
          APP="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "Waiting for revision ${REV} to reach Running state..."
          for i in $(seq 1 12); do
            STATE=$(az containerapp revision show \
              --name "${APP}" --resource-group "${RG}" --revision "${REV}" \
              --query "properties.runningState" --output tsv 2>/dev/null || echo "Unavailable")
            echo "  Attempt ${i}/12 — state: ${STATE}"
            if [[ "${STATE}" == "Running" ]]; then
              echo "Revision is Running."
              exit 0
            fi
            sleep 10
          done
          echo "::error::New API revision did not reach Running state within 120 s"
          exit 1

      # ── Phase 4: Smoke-test new revisions before shifting traffic ──────────
      # Each revision in a Multiple-revision Container App has its own
      # hostname: https://<revision-name>.<env-domain>.
      # We retrieve the revision-specific FQDN and verify the health endpoint
      # before any live traffic is redirected to the new revision.

      # Derive the new API revision's revision-specific URL once so that the
      # smoke-test, remote API tests, and the new frontend revision can all
      # reference it via steps.new-api-rev-url.outputs.url without repeating
      # az calls.  This step runs before creating the frontend revision so that
      # API_BASE_URL in the frontend points to the new backend revision — giving
      # E2E tests a genuine end-to-end view of the new code.
      - name: Derive new API revision URL
        id: new-api-rev-url
        run: |
          APP="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          REV="${{ steps.new-api-revision.outputs.revision }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          # Main FQDN:     <app-name>.<env-domain>
          # Revision FQDN: <revision-name>.<env-domain>
          MAIN_FQDN=$(az containerapp show \
            --name "${APP}" --resource-group "${RG}" \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          ENV_DOMAIN="${MAIN_FQDN#*.}"
          REV_URL="https://${REV}.${ENV_DOMAIN}"
          echo "New API revision URL: ${REV_URL}"
          echo "url=${REV_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test — new API revision health check
        run: |
          REV_URL="${{ steps.new-api-rev-url.outputs.url }}"
          echo "Smoke-testing new API revision at ${REV_URL}/health ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${REV_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "New API revision health check passed (HTTP 200)"
              exit 0
            fi
            echo "  Attempt ${i}/6 — HTTP ${STATUS}, retrying in 10 s..."
            sleep 10
          done
          echo "::error::New API revision health check failed after 60 s"
          exit 1

      # ── Phase 4.5: Remote API tests against new API revision ───────────────
      # Run direct HTTP API tests against the new revision's revision-specific
      # URL while 100 % of live traffic still goes to the old revision.
      # Uses the same REMOTE_API_BASE_URL pattern as Playwright uses
      # PLAYWRIGHT_BASE_URL — tests call the deployed API via real fetch requests.
      # continue-on-error allows the promote/rollback steps to always execute.
      - name: Run remote API tests against new revision
        id: remote-api
        continue-on-error: true
        env:
          REMOTE_API_BASE_URL: ${{ steps.new-api-rev-url.outputs.url }}
        run: npm run test:remote-api -- --reporter=verbose --reporter=junit --outputFile.junit=./test-results/remote-api.xml

      - name: Upload remote API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-remote-api
          path: test-results/remote-api.xml
          retention-days: 14
          if-no-files-found: ignore

      # Create the new frontend revision AFTER the new API revision URL is
      # known so that API_BASE_URL points to the new backend revision.
      # This ensures the E2E gate tests the new frontend against the new
      # backend end-to-end, not against the old (production) revision.
      - name: Create new frontend revision
        id: new-client-revision
        run: |
          SUFFIX="${{ steps.rev-suffix.outputs.suffix }}"
          APP="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          NEW_API_URL="${{ steps.new-api-rev-url.outputs.url }}"
          if [ -n "${NEW_API_URL}" ]; then
            az containerapp update \
              --name "${APP}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}/nova-circle-client:${{ needs.build-and-push.outputs.image-tag }}" \
              --revision-suffix "${SUFFIX}" \
              --set-env-vars "API_BASE_URL=${NEW_API_URL}" \
              --output none
          else
            az containerapp update \
              --name "${APP}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}/nova-circle-client:${{ needs.build-and-push.outputs.image-tag }}" \
              --revision-suffix "${SUFFIX}" \
              --output none
          fi
          echo "revision=${APP}--${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Wait for new frontend revision to be running
        run: |
          REV="${{ steps.new-client-revision.outputs.revision }}"
          APP="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "Waiting for revision ${REV} to reach Running state..."
          for i in $(seq 1 12); do
            STATE=$(az containerapp revision show \
              --name "${APP}" --resource-group "${RG}" --revision "${REV}" \
              --query "properties.runningState" --output tsv 2>/dev/null || echo "Unavailable")
            echo "  Attempt ${i}/12 — state: ${STATE}"
            if [[ "${STATE}" == "Running" ]]; then
              echo "Revision is Running."
              exit 0
            fi
            sleep 10
          done
          echo "::error::New frontend revision did not reach Running state within 120 s"
          exit 1

      # Derive the new frontend revision's revision-specific URL so Playwright
      # can target it directly while the old revision still carries all traffic.
      - name: Derive new frontend revision URL
        id: new-client-rev-url
        run: |
          APP="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          REV="${{ steps.new-client-revision.outputs.revision }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          MAIN_FQDN=$(az containerapp show \
            --name "${APP}" --resource-group "${RG}" \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          ENV_DOMAIN="${MAIN_FQDN#*.}"
          REV_URL="https://${REV}.${ENV_DOMAIN}"
          echo "New frontend revision URL: ${REV_URL}"
          echo "url=${REV_URL}" >> "$GITHUB_OUTPUT"

      # ── Phase 5: E2E gate — Playwright tests against new revision ─────────
      # Tests run directly against the new frontend revision's revision-specific
      # URL while 100 % of live traffic still goes to the old revisions.
      # Users are never exposed to the candidate revision during the gate.
      # continue-on-error allows the promote/rollback steps to always execute.

      # Ensure the API app registration has the correct Application ID URI
      # (api://<clientId>) and user_impersonation OAuth2 scope exposed.
      # Without these Azure AD cannot issue access tokens with the expected
      # audience, so every authenticated API call returns 401.
      # This step is idempotent and runs on every deploy so a misconfigured
      # tenant does not block the pipeline indefinitely.
      # Admin consent is attempted best-effort; failure is non-fatal.
      - name: Ensure Azure AD API app registration is configured
        run: |
          CLIENT_ID="${{ vars.API_AZURE_CLIENT_ID }}"
          OBJ_ID="${{ vars.API_AZURE_OBJECT_ID }}"
          if [[ -z "${OBJ_ID}" || -z "${CLIENT_ID}" ]]; then
            echo "::warning::API_AZURE_OBJECT_ID or API_AZURE_CLIENT_ID not set — skipping Azure AD app registration check. Re-run bootstrap.sh."
            exit 0
          fi

          # ── 1a. Ensure accessTokenAcceptedVersion is 2 ───────────────────────
          # Without this the tenant issues v1 tokens whose issuer
          # (https://sts.windows.net/{tenantId}/) differs from the v2 endpoint.
          # Setting it to 2 ensures v2 tokens with the expected v2 issuer.
          CURRENT_VERSION=$(az rest --method GET \
            --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
            --query "api.requestedAccessTokenVersion" --output tsv 2>/dev/null || echo "")
          if [[ "${CURRENT_VERSION}" != "2" ]]; then
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
              --body '{"api":{"requestedAccessTokenVersion":2}}' \
              --headers 'Content-Type=application/json' \
              --output none \
              && echo "Set accessTokenAcceptedVersion to 2." \
              || echo "::warning::Could not set accessTokenAcceptedVersion — ensure the CD service principal has Application.ReadWrite.OwnedBy permission."
          else
            echo "accessTokenAcceptedVersion is already 2."
          fi

          # ── 1b. Ensure Application ID URI (api://<clientId>) is set ──────────
          EXPECTED_URI="api://${CLIENT_ID}"
          CURRENT_URIS=$(az rest --method GET \
            --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
            --query "identifierUris" --output json 2>/dev/null || echo "[]")
          HAS_URI=$(echo "${CURRENT_URIS}" | \
            jq --arg uri "${EXPECTED_URI}" '[.[] | select(. == $uri)] | length' 2>/dev/null || echo "0")
          if [[ "${HAS_URI}" == "0" ]]; then
            UPDATED_URIS=$(echo "${CURRENT_URIS}" | \
              jq --arg uri "${EXPECTED_URI}" '(. // []) + [$uri] | unique')
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
              --body "$(jq -n --argjson uris "${UPDATED_URIS}" '{"identifierUris":$uris}')" \
              --headers 'Content-Type=application/json' \
              --output none \
              && echo "Set Application ID URI to ${EXPECTED_URI}." \
              || echo "::warning::Could not set Application ID URI — check CD service principal permissions."
          else
            echo "Application ID URI ${EXPECTED_URI} is already set."
          fi

          # ── 2. Ensure user_impersonation scope is exposed and enabled ───────────
          CURRENT_SCOPES=$(az rest --method GET \
            --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
            --query "api.oauth2PermissionScopes" --output json 2>/dev/null || echo "[]")
          # Check for any existing scope with value=="user_impersonation", enabled or disabled.
          EXISTING_SCOPE=$(echo "${CURRENT_SCOPES}" | \
            jq '[.[] | select(.value == "user_impersonation")] | first // empty' 2>/dev/null)
          if [[ -z "${EXISTING_SCOPE}" ]]; then
            # No scope found — add a new one.
            # GitHub Actions always runs on Ubuntu where /proc/sys/kernel/random/uuid
            # is available; python3 is a reliable fallback for any other environment.
            SCOPE_ID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null \
              || python3 -c "import uuid; print(uuid.uuid4())")
            UPDATED_SCOPES=$(echo "${CURRENT_SCOPES}" | jq \
              --arg id "${SCOPE_ID}" \
              '(. // []) + [{
                "id": $id,
                "value": "user_impersonation",
                "type": "User",
                "adminConsentDisplayName": "Access Nova-Circle API",
                "adminConsentDescription": "Allows the app to access Nova-Circle API on behalf of the signed-in user.",
                "userConsentDisplayName": "Access Nova-Circle API",
                "userConsentDescription": "Allows this app to access Nova-Circle API on your behalf.",
                "isEnabled": true
              }]')
            PATCH_BODY=$(jq -n --argjson scopes "${UPDATED_SCOPES}" '{"api":{"oauth2PermissionScopes":$scopes}}')
            az rest --method PATCH \
              --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
              --body "${PATCH_BODY}" \
              --headers 'Content-Type=application/json' \
              --output none \
              && echo "Exposed user_impersonation scope." \
              || echo "::warning::Could not expose user_impersonation scope — check CD service principal permissions."
          else
            IS_ENABLED=$(echo "${EXISTING_SCOPE}" | jq '.isEnabled' 2>/dev/null || echo "false")
            if [[ "${IS_ENABLED}" != "true" ]]; then
              # Scope exists but is disabled — re-enable it in-place by patching the
              # existing entry (keeping the same id to avoid Graph uniqueness rejection).
              UPDATED_SCOPES=$(echo "${CURRENT_SCOPES}" | jq \
                'map(if .value == "user_impersonation" then .isEnabled = true else . end)')
              PATCH_BODY=$(jq -n --argjson scopes "${UPDATED_SCOPES}" '{"api":{"oauth2PermissionScopes":$scopes}}')
              az rest --method PATCH \
                --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
                --body "${PATCH_BODY}" \
                --headers 'Content-Type=application/json' \
                --output none \
                && echo "Re-enabled user_impersonation scope." \
                || echo "::warning::Could not re-enable user_impersonation scope — check CD service principal permissions."
            else
              echo "user_impersonation scope is already exposed and enabled."
            fi
          fi

          # ── 3. Grant admin consent via oauth2PermissionGrants ─────────────────
          # `az ad app permission admin-consent` only consents permissions that
          # are listed in requiredResourceAccess.  The self-referencing
          # user_impersonation scope is NOT in requiredResourceAccess, so that
          # command has no effect here.  The correct approach is to create or
          # update an oauth2PermissionGrant with consentType=AllPrincipals.
          # This requires DelegatedPermissionGrant.ReadWrite.All on the CD SP,
          # which bootstrap.sh grants when setting up the CD app registration.
          SP_ID=$(az ad sp show --id "${CLIENT_ID}" --query id --output tsv 2>/dev/null || echo "")
          if [[ -n "${SP_ID}" ]]; then
            ALL_GRANTS=$(az rest --method GET \
              --uri "https://graph.microsoft.com/v1.0/servicePrincipals/${SP_ID}/oauth2PermissionGrants" \
              --output json 2>/dev/null || echo '{"value":[]}')
            EXISTING_GRANT=$(echo "${ALL_GRANTS}" | \
              jq --arg sp "${SP_ID}" \
                '[.value[] | select(.resourceId==$sp and .clientId==$sp and .consentType=="AllPrincipals")] | first // empty' \
              2>/dev/null || echo "")
            GRANT_SCOPE=$(echo "${EXISTING_GRANT}" | jq -r '.scope // ""' 2>/dev/null || echo "")
            GRANT_ID=$(echo "${EXISTING_GRANT}" | jq -r '.id // ""' 2>/dev/null || echo "")

            if [[ -z "${GRANT_ID}" ]]; then
              # No AllPrincipals grant exists — create one.
              az rest --method POST \
                --uri "https://graph.microsoft.com/v1.0/oauth2PermissionGrants" \
                --headers 'Content-Type=application/json' \
                --body "{\"clientId\":\"${SP_ID}\",\"consentType\":\"AllPrincipals\",\"resourceId\":\"${SP_ID}\",\"scope\":\"user_impersonation\"}" \
                --output none \
                && echo "Admin consent (AllPrincipals) granted via oauth2PermissionGrant." \
                || echo "::warning::Could not create oauth2PermissionGrant. Run bootstrap.sh to grant DelegatedPermissionGrant.ReadWrite.All to the CD service principal, then re-run this pipeline."
            elif [[ "${GRANT_SCOPE}" != *"user_impersonation"* ]]; then
              # Grant exists but is missing user_impersonation — update it.
              NEW_SCOPE=$(printf '%s user_impersonation' "${GRANT_SCOPE}" | tr -s ' ' | sed 's/^ //;s/ $//')
              az rest --method PATCH \
                --uri "https://graph.microsoft.com/v1.0/oauth2PermissionGrants/${GRANT_ID}" \
                --headers 'Content-Type=application/json' \
                --body "{\"scope\":\"${NEW_SCOPE}\"}" \
                --output none \
                && echo "Updated oauth2PermissionGrant to include user_impersonation." \
                || echo "::warning::Could not update oauth2PermissionGrant — check CD service principal permissions."
            else
              echo "Admin consent for user_impersonation already granted (AllPrincipals)."
            fi
          else
            echo "::warning::Could not determine service principal ID for app ${CLIENT_ID} — admin consent check skipped."
          fi

      # MSAL uses window.location.origin as redirectUri, so the revision-specific
      # origin must be registered as an Azure AD SPA redirect URI before sign-in
      # will succeed.  We add it here and remove it again after tests complete
      # (see "Remove revision URL from Azure AD SPA redirect URIs" below).
      # The CD service principal must be an owner of the API app registration —
      # bootstrap.sh ensures this by calling `az ad app owner add`.
      - name: Add revision URL to Azure AD SPA redirect URIs
        id: add-redirect-uri
        run: |
          CLIENT_ID="${{ vars.API_AZURE_CLIENT_ID }}"
          OBJ_ID="${{ vars.API_AZURE_OBJECT_ID }}"
          REV_URL="${{ steps.new-client-rev-url.outputs.url }}"
          if [[ -z "${OBJ_ID}" ]]; then
            echo "::error::API_AZURE_OBJECT_ID repository variable is not set. Re-run bootstrap.sh to populate it."
            exit 1
          fi
          # Read the current SPA redirect URI list. Fail fast if the query fails
          # rather than defaulting to an empty list, to avoid overwriting existing
          # redirect URIs with only the revision URL.
          # Use GET /applications/{objectId} directly — this works with
          # Application.ReadWrite.OwnedBy for owned apps.  az ad app show --id <appId>
          # uses a filter query (GET /applications?$filter=appId eq '...') which
          # requires the broader Application.Read.All permission.
          CURRENT=""
          SPA_ERR_FILE="${RUNNER_TEMP}/spa_show_err_$$.txt"
          if ! CURRENT=$(az rest --method GET \
            --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
            --query spa.redirectUris --output json 2>"${SPA_ERR_FILE}"); then
            # Log raw Azure CLI stderr with plain echo so multi-line output is
            # preserved without risking annotation parsing issues.
            echo "Azure CLI stderr while retrieving SPA redirect URIs:"
            cat "${SPA_ERR_FILE}" || true
            # Sanitize before embedding in the workflow command: flatten newlines
            # and escape '%' to prevent breaking GitHub Actions annotation parsing.
            SANITIZED_ERR=$(tr '\r\n' ' ' < "${SPA_ERR_FILE}" 2>/dev/null || echo "unable to read error details")
            SANITIZED_ERR=${SANITIZED_ERR//'%'/'%25'}
            echo "::error::Failed to retrieve SPA redirect URIs for app ${CLIENT_ID}: ${SANITIZED_ERR}"
            echo "::error::Ensure the CD service principal is an owner of the app registration and the CD app has Application.ReadWrite.OwnedBy Graph permission granted with admin consent. Re-run bootstrap.sh to fix."
            exit 1
          fi
          # Build updated JSON array (deduped) for the Graph PATCH body.
          UPDATED_JSON=$(echo "${CURRENT}" | \
            jq --arg url "${REV_URL}" '(. // []) + [$url] | unique')
          # az ad app update does not support --spa-redirect-uris; use the
          # Microsoft Graph REST API directly via az rest instead.
          az rest --method PATCH \
            --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
            --body "$(jq -n --argjson uris "${UPDATED_JSON}" '{"spa":{"redirectUris":$uris}}')" \
            --headers 'Content-Type=application/json' \
            --output none
          echo "Added ${REV_URL} to SPA redirect URIs."

      - name: Install client dependencies (E2E)
        working-directory: client
        run: npm ci

      # Decode the pre-authenticated Playwright storage state when available.
      # Preferred for production tenants that enforce MFA or Conditional Access.
      # When the secret is absent the step is a no-op and global-setup falls
      # back to the headless username/password path.
      - name: Restore pre-authenticated Playwright state
        env:
          PLAYWRIGHT_AUTH_STATE_B64: ${{ secrets.PLAYWRIGHT_AUTH_STATE_B64 }}
        working-directory: client
        run: |
          if [ -n "$PLAYWRIGHT_AUTH_STATE_B64" ]; then
            mkdir -p e2e/.auth
            printf '%s' "$PLAYWRIGHT_AUTH_STATE_B64" | base64 -d > e2e/.auth/injected.json
            echo "PLAYWRIGHT_AUTH_STATE_FILE=${{ github.workspace }}/client/e2e/.auth/injected.json" >> "$GITHUB_ENV"
            echo "Pre-authenticated state restored — headless sign-in will be skipped."
          else
            echo "PLAYWRIGHT_AUTH_STATE_B64 not set — will attempt headless sign-in."
          fi

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against new revision (0 % live traffic)
        id: e2e
        continue-on-error: true
        working-directory: client
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: ${{ steps.new-client-rev-url.outputs.url }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: client/test-results/e2e.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        if: steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: client/test-results/
          retention-days: 7
          if-no-files-found: ignore

      # Remove the revision-specific URL that was registered before E2E tests.
      # Runs unconditionally (always()) so it cleans up on both success and failure.
      # The step is intentionally non-fatal (set +e +o pipefail) so that a cleanup
      # failure never prevents the promote/rollback phases from running.
      - name: Remove revision URL from Azure AD SPA redirect URIs
        if: always()
        run: |
          # Disable bash -e / pipefail: errors emit warnings but never fail the job.
          set +e +o pipefail

          CLIENT_ID="${{ vars.API_AZURE_CLIENT_ID }}"
          OBJ_ID="${{ vars.API_AZURE_OBJECT_ID }}"
          REV_URL="${{ steps.new-client-rev-url.outputs.url }}"
          CLEANUP_ERROR=0

          if [[ -z "${OBJ_ID}" ]]; then
            echo "::warning::API_AZURE_OBJECT_ID is not set; skipping cleanup of ${REV_URL}."
            CLEANUP_ERROR=1
          fi

          CURRENT=""
          if [[ ${CLEANUP_ERROR} -eq 0 ]]; then
            CURRENT=$(az rest --method GET \
              --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
              --query spa.redirectUris --output json 2>"${RUNNER_TEMP}/spa_cleanup_err_$$.txt")
            if [[ $? -ne 0 || -z "${CURRENT}" ]]; then
              # Log raw stderr separately so multi-line output is preserved.
              echo "Azure CLI stderr while querying SPA redirect URIs for cleanup:"
              cat "${RUNNER_TEMP}/spa_cleanup_err_$$.txt" || true
              echo "::warning::Failed to query SPA redirect URIs for app ${CLIENT_ID}; skipping cleanup of ${REV_URL}."
              CLEANUP_ERROR=1
            fi
          fi

          if [[ ${CLEANUP_ERROR} -eq 0 ]]; then
            # Build the remaining list as a JSON array, excluding the revision URL.
            # Capture jq output separately so its exit code is checkable.
            REMAINING_JSON=$(echo "${CURRENT}" | \
              jq --arg url "${REV_URL}" '(. // []) | [.[] | select(. != $url)]')
            if [[ $? -ne 0 ]]; then
              echo "::warning::Failed to compute remaining SPA redirect URIs for app ${CLIENT_ID}; skipping cleanup of ${REV_URL}."
              CLEANUP_ERROR=1
            fi
          fi

          if [[ ${CLEANUP_ERROR} -eq 0 ]]; then
            REMAINING_COUNT=$(echo "${REMAINING_JSON}" | jq 'length' 2>/dev/null)
            if [[ $? -ne 0 || -z "${REMAINING_COUNT}" ]]; then
              echo "::warning::Failed to count remaining SPA redirect URIs for app ${CLIENT_ID}; skipping cleanup of ${REV_URL}."
              CLEANUP_ERROR=1
            fi
          fi

          if [[ ${CLEANUP_ERROR} -eq 0 ]]; then
            if [[ "${REMAINING_COUNT}" -gt 0 ]]; then
              # az ad app update does not support --spa-redirect-uris; use the
              # Microsoft Graph REST API directly via az rest instead.
              az rest --method PATCH \
                --uri "https://graph.microsoft.com/v1.0/applications/${OBJ_ID}" \
                --body "$(jq -n --argjson uris "${REMAINING_JSON}" '{"spa":{"redirectUris":$uris}}')" \
                --headers 'Content-Type=application/json' \
                --output none \
                || echo "::warning::Could not remove ${REV_URL} from SPA redirect URIs on app ${CLIENT_ID} — remove manually."
              echo "Removed ${REV_URL} from SPA redirect URIs."
            else
              echo "::warning::No other SPA redirect URIs remain for app ${CLIENT_ID}; skipping update to avoid clearing all URIs."
              echo "::warning::The revision URL ${REV_URL} was not removed — investigate why no non-revision redirect URIs are configured."
            fi
          else
            echo "::warning::Skipped or partially failed cleanup of SPA redirect URIs for app ${CLIENT_ID}; promote/rollback will still run."
          fi

          # Always exit 0 so this cleanup step never blocks promote/rollback.
          exit 0

      # ── Phase 6a: Promote — E2E and remote API tests passed ───────────────
      # Shift 100 % live traffic to the new revisions, then deactivate the old
      # ones.  Traffic is only moved after both the remote API gate and the E2E
      # gate pass.
      - name: Promote — shift traffic to new API revision
        if: steps.e2e.outcome == 'success' && steps.remote-api.outcome == 'success'
        run: |
          echo "All gates passed — shifting 100 % traffic to new API revision: ${{ steps.new-api-revision.outputs.revision }}"
          az containerapp ingress traffic set \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision-weight "${{ steps.new-api-revision.outputs.revision }}=100" \
            --output none

      - name: Promote — shift traffic to new frontend revision
        if: steps.e2e.outcome == 'success' && steps.remote-api.outcome == 'success'
        run: |
          echo "All gates passed — shifting 100 % traffic to new frontend revision: ${{ steps.new-client-revision.outputs.revision }}"
          az containerapp ingress traffic set \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision-weight "${{ steps.new-client-revision.outputs.revision }}=100" \
            --output none

      - name: Promote — deactivate old API revision
        if: steps.e2e.outcome == 'success' && steps.remote-api.outcome == 'success'
        run: |
          OLD_REV="${{ steps.old-revisions.outputs.api }}"
          NEW_REV="${{ steps.new-api-revision.outputs.revision }}"
          if [ -z "${OLD_REV}" ]; then
            echo "::warning::Old API revision name is empty — skipping deactivation."
          elif [ "${OLD_REV}" = "${NEW_REV}" ]; then
            echo "Old API revision (${OLD_REV}) is the same as the new one — skipping deactivation."
          else
            echo "Deactivating old API revision: ${OLD_REV}"
            az containerapp revision deactivate \
              --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --revision "${OLD_REV}" \
              --output none \
              || echo "::warning::Could not deactivate old API revision ${OLD_REV} — it may already be inactive."
          fi

      - name: Promote — deactivate old frontend revision
        if: steps.e2e.outcome == 'success' && steps.remote-api.outcome == 'success'
        run: |
          OLD_REV="${{ steps.old-revisions.outputs.client }}"
          NEW_REV="${{ steps.new-client-revision.outputs.revision }}"
          if [ -z "${OLD_REV}" ]; then
            echo "::warning::Old frontend revision name is empty — skipping deactivation."
          elif [ "${OLD_REV}" = "${NEW_REV}" ]; then
            echo "Old frontend revision (${OLD_REV}) is the same as the new one — skipping deactivation."
          else
            echo "Deactivating old frontend revision: ${OLD_REV}"
            az containerapp revision deactivate \
              --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --revision "${OLD_REV}" \
              --output none \
              || echo "::warning::Could not deactivate old frontend revision ${OLD_REV} — it may already be inactive."
          fi

      # ── Phase 6b: Rollback — E2E or remote API tests failed ───────────────
      # Because live traffic never moved to the new revisions, no traffic
      # restore is required.  Simply deactivate the new revisions so they stop
      # consuming resources, then fail the job.
      - name: Rollback — deactivate new API revision
        if: steps.e2e.outcome == 'failure' || steps.remote-api.outcome == 'failure'
        run: |
          NEW_REV="${{ steps.new-api-revision.outputs.revision }}"
          echo "Gate failed — deactivating new API revision: ${NEW_REV}"
          az containerapp revision deactivate \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision "${NEW_REV}" \
            --output none \
            || echo "::warning::Could not deactivate new API revision ${NEW_REV} — manual cleanup may be required."

      - name: Rollback — deactivate new frontend revision
        if: steps.e2e.outcome == 'failure' || steps.remote-api.outcome == 'failure'
        run: |
          NEW_REV="${{ steps.new-client-revision.outputs.revision }}"
          echo "Gate failed — deactivating new frontend revision: ${NEW_REV}"
          az containerapp revision deactivate \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision "${NEW_REV}" \
            --output none \
            || echo "::warning::Could not deactivate new frontend revision ${NEW_REV} — manual cleanup may be required."

      - name: Fail — deployment gates did not pass
        if: steps.e2e.outcome == 'failure' || steps.remote-api.outcome == 'failure'
        run: |
          echo "::error::Deployment gates failed (E2E: ${{ steps.e2e.outcome }}, remote-API: ${{ steps.remote-api.outcome }}). New revisions have been deactivated; old revisions continue to serve all traffic."
          exit 1
