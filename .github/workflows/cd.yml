name: CD

# Runs after the CI workflow passes on the main branch.
# Only deploys when every CI gate (lint, typecheck, all tests, migration-check,
# build) has succeeded.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# OIDC: request a short-lived Azure token — no static service-principal secrets.
permissions:
  id-token: write
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build and push both Docker images to Azure Container Registry.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and push images
    # Skip if CI failed or was cancelled.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (full commit SHA for traceability)
        id: set-tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # Authenticate to Azure using OIDC federated credentials.
      # No secrets required — only the three repository variables listed below.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # az acr login uses the already-authenticated Azure CLI identity.
      - name: Login to Azure Container Registry
        run: |
          REGISTRY_LOGIN_SERVER="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          REGISTRY_NAME="${REGISTRY_LOGIN_SERVER%%.*}"
          az acr login --name "$REGISTRY_NAME"

      - name: Build and push backend image
        run: |
          REGISTRY="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          TAG="${{ steps.set-tag.outputs.tag }}"
          docker build \
            --tag "${REGISTRY}/nova-circle-api:${TAG}" \
            --tag "${REGISTRY}/nova-circle-api:latest" \
            .
          docker push "${REGISTRY}/nova-circle-api:${TAG}"
          docker push "${REGISTRY}/nova-circle-api:latest"

      - name: Build and push frontend image
        # The frontend image is built and pushed to ACR so it is ready to deploy.
        # Deployment of the frontend (e.g. a second Container App or Static Web App)
        # is not yet automated because no frontend hosting module exists in the Bicep
        # templates. Add a container-app-frontend.bicep module and a corresponding
        # deploy step here when the hosting strategy is finalised.
        run: |
          REGISTRY="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          TAG="${{ steps.set-tag.outputs.tag }}"
          docker build \
            --tag "${REGISTRY}/nova-circle-client:${TAG}" \
            --tag "${REGISTRY}/nova-circle-client:latest" \
            client/
          docker push "${REGISTRY}/nova-circle-client:${TAG}"
          docker push "${REGISTRY}/nova-circle-client:latest"

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy infrastructure, run migrations, and smoke-test the live API.
  # Protected by the `production` GitHub environment (requires a reviewer).
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Deploy (or update) all Azure resources via the idempotent Bicep template.
      # The new backend image tag is passed so the Container App is updated in
      # the same operation.
      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters \
              containerImage="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}/nova-circle-api:${{ needs.build-and-push.outputs.image-tag }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              azureTenantId="${{ vars.AZURE_TENANT_ID }}" \
              azureClientId="${{ vars.AZURE_CLIENT_ID }}" \
            --output none

      - name: Get deployment outputs
        id: deploy-outputs
        run: |
          API_URL=$(az deployment group show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name main \
            --query "properties.outputs.apiUrl.value" \
            --output tsv)
          echo "api-url=${API_URL}" >> "$GITHUB_OUTPUT"

      # Run Knex migrations directly from the workflow runner.
      # Requires the PostgreSQL firewall to allow the GitHub Actions runner IP
      # (or a private endpoint — see docs/cd.md for alternatives).
      - name: Set up Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      # Wait for the Container App to stabilise then assert the health endpoint
      # returns HTTP 200.  Retries up to 6 times (60 s total) to allow for
      # cold-start after scale-to-zero.
      - name: Smoke test — API health check
        run: |
          API_URL="${{ steps.deploy-outputs.outputs.api-url }}"
          echo "Testing ${API_URL}/health ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt ${i}/6 — HTTP ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Health check failed after 60s"
          exit 1
