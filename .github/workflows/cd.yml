name: CD

# Runs after the CI workflow passes on the main or dev branch.
# Only deploys when every CI gate (lint, typecheck, all tests, migration-check,
# build) has succeeded.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, dev]

# OIDC: request a short-lived Azure token — no static service-principal secrets.
permissions:
  id-token: write
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build and push both Docker images to Azure Container Registry.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and push images
    # Skip if CI failed or was cancelled.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      # Check out the exact commit that passed CI to ensure images are built
      # from the same source tree that was tested — not a later commit.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag (full commit SHA for traceability)
        id: set-tag
        run: echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      # Authenticate to Azure using OIDC federated credentials.
      # No secrets required — only the three repository variables listed below.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # az acr login uses the already-authenticated Azure CLI identity.
      - name: Login to Azure Container Registry
        run: |
          REGISTRY_LOGIN_SERVER="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          REGISTRY_NAME="${REGISTRY_LOGIN_SERVER%%.*}"
          az acr login --name "$REGISTRY_NAME"

      - name: Build and push backend image
        run: |
          REGISTRY="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          TAG="${{ steps.set-tag.outputs.tag }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Sanitise branch name: replace characters invalid in Docker tags with hyphens.
          SAFE_BRANCH="${BRANCH//[^a-zA-Z0-9._-]/-}"
          MOVING_TAG="latest-${SAFE_BRANCH}"
          docker build \
            --tag "${REGISTRY}/nova-circle-api:${TAG}" \
            --tag "${REGISTRY}/nova-circle-api:${MOVING_TAG}" \
            .
          docker push "${REGISTRY}/nova-circle-api:${TAG}"
          docker push "${REGISTRY}/nova-circle-api:${MOVING_TAG}"
          # Only overwrite :latest from main so dev builds don't clobber main artifacts.
          if [[ "${BRANCH}" == "main" ]]; then
            docker tag "${REGISTRY}/nova-circle-api:${TAG}" "${REGISTRY}/nova-circle-api:latest"
            docker push "${REGISTRY}/nova-circle-api:latest"
          fi

      - name: Build and push frontend image
        run: |
          REGISTRY="${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}"
          TAG="${{ steps.set-tag.outputs.tag }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Sanitise branch name: replace characters invalid in Docker tags with hyphens.
          SAFE_BRANCH="${BRANCH//[^a-zA-Z0-9._-]/-}"
          MOVING_TAG="latest-${SAFE_BRANCH}"
          docker build \
            --tag "${REGISTRY}/nova-circle-client:${TAG}" \
            --tag "${REGISTRY}/nova-circle-client:${MOVING_TAG}" \
            client/
          docker push "${REGISTRY}/nova-circle-client:${TAG}"
          docker push "${REGISTRY}/nova-circle-client:${MOVING_TAG}"
          # Only overwrite :latest from main so dev builds don't clobber main artifacts.
          if [[ "${BRANCH}" == "main" ]]; then
            docker tag "${REGISTRY}/nova-circle-client:${TAG}" "${REGISTRY}/nova-circle-client:latest"
            docker push "${REGISTRY}/nova-circle-client:latest"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy infrastructure, run migrations, then perform a blue/green revision
  # swap gated by Playwright E2E tests:
  #
  #   1. Deploy Bicep with the CURRENT image (no new revision yet).
  #   2. Run DB migrations against the updated schema.
  #   3. Create a NEW revision of each Container App (0 % traffic initially).
  #   4. Smoke-test the new API revision via its revision-specific URL.
  #   5. Run Playwright E2E tests against the new frontend revision's
  #      revision-specific URL — old revisions continue to serve 100 % of
  #      live traffic throughout so users are never exposed to the candidate.
  #   6a. E2E pass  → shift 100 % traffic to new revisions, deactivate old.
  #   6b. E2E fail  → deactivate the new revisions (no traffic restore needed
  #       — live traffic was never moved) and fail the job.
  #
  # Protected by the `production` GitHub environment (requires a reviewer).
  #
  # Required secrets (production environment):
  #   POSTGRES_ADMIN_PASSWORD        – PostgreSQL admin password for migrations
  #   PLAYWRIGHT_AUTH_STATE_B64      – base64-encoded Playwright storage state
  #                                    (preferred; avoids MFA / Conditional Access)
  #   PLAYWRIGHT_TEST_USER_EMAIL     – fallback headless sign-in email
  #   PLAYWRIGHT_TEST_USER_PASSWORD  – fallback headless sign-in password
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    # Prevent concurrent deploys from racing on SPA redirect URI read-modify-write.
    # cancel-in-progress: false so a queued deploy is not discarded — it waits.
    concurrency:
      group: deploy-${{ vars.AZURE_ENVIRONMENT_NAME }}
      cancel-in-progress: false

    steps:
      # Check out the same commit that was built and tested.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Phase 1: Deploy infrastructure with the CURRENT image ──────────────
      # Keep the currently running images while infra resources are updated.
      # This prevents a new (un-migrated) revision from going live before
      # migrations have run.
      - name: Get current Container App image
        id: current-image
        run: |
          CURRENT=$(az containerapp show \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" \
            --output tsv 2>/dev/null \
            || echo "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest")
          echo "image=${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: Get current frontend Container App image
        id: current-frontend-image
        run: |
          CURRENT=$(az containerapp show \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "properties.template.containers[0].image" \
            --output tsv 2>/dev/null \
            || echo "mcr.microsoft.com/azuredocs/containerapps-helloworld:latest")
          echo "image=${CURRENT}" >> "$GITHUB_OUTPUT"

      # Update all Azure infrastructure (networking, DB, Container App env, etc.)
      # but keep both Container Apps on their current images so no new revision
      # starts against the old schema.  The Bicep templates set
      # activeRevisionsMode: 'Multiple' so subsequent revision operations work.
      - name: Deploy infrastructure (Bicep)
        env:
          # main.bicepparam uses readEnvironmentVariable() which is evaluated at
          # Bicep compile time (before --parameters CLI overrides take effect).
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          POSTGRES_FQDN=$(az deployment group create \
            --name "nova-circle-${{ github.run_id }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters \
              containerImage="${{ steps.current-image.outputs.image }}" \
              frontendContainerImage="${{ steps.current-frontend-image.outputs.image }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              azureTenantId="${{ vars.API_AZURE_TENANT_ID }}" \
              azureClientId="${{ vars.API_AZURE_CLIENT_ID }}" \
              corsOrigin="${{ vars.CORS_ORIGIN }}" \
              frontendAzureClientId="${{ vars.API_AZURE_CLIENT_ID }}" \
              frontendAzureTenantId="${{ vars.API_AZURE_TENANT_ID }}" \
            --query "properties.outputs.postgresFqdn.value" \
            --output tsv)
          echo "postgres_fqdn=${POSTGRES_FQDN}" >> "$GITHUB_ENV"

      # ── Phase 2: Run DB migrations ─────────────────────────────────────────
      # Run Knex migrations directly from the workflow runner.
      # A temporary PostgreSQL firewall rule is opened for the runner's IP,
      # then removed after migrations complete (or if any step fails).
      - name: Allow runner IP in PostgreSQL firewall
        run: |
          RUNNER_IP=$(curl -s --max-time 10 https://api.ipify.org \
            || curl -s --max-time 10 https://ifconfig.me)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_ENV"
          az postgres flexible-server firewall-rule create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "psql-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --rule-name "gh-actions-runner" \
            --start-ip-address "${RUNNER_IP}" \
            --end-ip-address "${RUNNER_IP}" \
            --output none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          NODE_ENV: production
        run: |
          if [[ -z "${POSTGRES_ADMIN_PASSWORD}" ]]; then
            echo "::error::POSTGRES_ADMIN_PASSWORD secret is not set or is empty"
            exit 1
          fi
          # URL-encode the password so special characters don't break the
          # connection string passed to pg's URL parser (new URL()).
          # Read from env (not sys.argv) so the secret is never on the process command line.
          ENCODED_PW=$(python3 -c \
            "import urllib.parse, os; print(urllib.parse.quote(os.environ['POSTGRES_ADMIN_PASSWORD'], safe=''))")
          # Mask the encoded form so it is not visible in logs.
          echo "::add-mask::${ENCODED_PW}"
          DATABASE_URL="postgresql://ncadmin:${ENCODED_PW}@${postgres_fqdn}:5432/nova_circle?sslmode=require"
          echo "::add-mask::${DATABASE_URL}"
          export DATABASE_URL
          npm run migrate

      - name: Remove runner IP from PostgreSQL firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "psql-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --rule-name "gh-actions-runner" \
            --yes --output none || true

      # ── Phase 3: Create new revisions with 0 % traffic ────────────────────
      # Record the revision currently receiving live traffic (non-zero weight)
      # so it can be deactivated after a successful E2E gate (promote path).
      # Using the traffic weight query rather than latestRevisionName ensures
      # we target the correct revision even when traffic was previously pinned
      # to an older revision (e.g., after a rollback).
      - name: Record old revision names
        id: old-revisions
        run: |
          OLD_API=$(az containerapp show \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query 'properties.configuration.ingress.traffic[?weight>`0`].revisionName | [0]' \
            --output tsv)
          OLD_CLIENT=$(az containerapp show \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query 'properties.configuration.ingress.traffic[?weight>`0`].revisionName | [0]' \
            --output tsv)
          echo "Old API revision:      ${OLD_API}"
          echo "Old frontend revision: ${OLD_CLIENT}"
          echo "api=${OLD_API}"       >> "$GITHUB_OUTPUT"
          echo "client=${OLD_CLIENT}" >> "$GITHUB_OUTPUT"

      # Build a short, ACA-compatible revision suffix:
      # - lowercase alphanumeric, max 10 chars, must start with a letter.
      # - Format: 'r' + first 7 hex chars of the commit SHA + 2-char hex of
      #   the run attempt (wraps at 256).  The run-attempt component ensures
      #   uniqueness when the workflow is re-run for the same commit SHA.
      - name: Compute revision suffix
        id: rev-suffix
        run: |
          BASE_SHA_PART=$(echo '${{ needs.build-and-push.outputs.image-tag }}' | cut -c1-7 | tr '[:upper:]' '[:lower:]')
          ATTEMPT_NUMBER=${GITHUB_RUN_ATTEMPT:-1}
          ATTEMPT_MOD=$(( (ATTEMPT_NUMBER - 1) % 256 ))
          ATTEMPT_HEX=$(printf '%02x' "${ATTEMPT_MOD}")
          SUFFIX="r${BASE_SHA_PART}${ATTEMPT_HEX}"
          echo "Computed revision suffix: ${SUFFIX}"
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"

      # Configure the managed-identity ACR pull credential before updating the
      # image.  When the Bicep deployment ran with the MCR placeholder image
      # (useAcr=false) it writes registries:[] which clears any existing
      # credential; this step restores it so the image pull succeeds.
      - name: Configure ACR pull credential — API
        run: |
          az containerapp registry set \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}" \
            --identity "system" \
            --output none

      - name: Configure ACR pull credential — frontend
        run: |
          az containerapp registry set \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}" \
            --identity "system" \
            --output none

      # Create new revisions.  Because activeRevisionsMode is 'Multiple' (set
      # in Bicep), each update creates a revision with 0 % traffic weight so
      # the old revision continues to serve all live traffic.
      - name: Create new API revision
        id: new-api-revision
        run: |
          SUFFIX="${{ steps.rev-suffix.outputs.suffix }}"
          APP="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          az containerapp update \
            --name "${APP}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}/nova-circle-api:${{ needs.build-and-push.outputs.image-tag }}" \
            --revision-suffix "${SUFFIX}" \
            --output none
          echo "revision=${APP}--${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Create new frontend revision
        id: new-client-revision
        run: |
          SUFFIX="${{ steps.rev-suffix.outputs.suffix }}"
          APP="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          az containerapp update \
            --name "${APP}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_REGISTRY_LOGIN_SERVER }}/nova-circle-client:${{ needs.build-and-push.outputs.image-tag }}" \
            --revision-suffix "${SUFFIX}" \
            --output none
          echo "revision=${APP}--${SUFFIX}" >> "$GITHUB_OUTPUT"

      # Poll until both new revisions report 'Running'.  Allows up to 120 s
      # for cold-start / image pull before aborting.
      - name: Wait for new API revision to be running
        run: |
          REV="${{ steps.new-api-revision.outputs.revision }}"
          APP="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "Waiting for revision ${REV} to reach Running state..."
          for i in $(seq 1 12); do
            STATE=$(az containerapp revision show \
              --name "${APP}" --resource-group "${RG}" --revision "${REV}" \
              --query "properties.runningState" --output tsv 2>/dev/null || echo "Unavailable")
            echo "  Attempt ${i}/12 — state: ${STATE}"
            if [[ "${STATE}" == "Running" ]]; then
              echo "Revision is Running."
              exit 0
            fi
            sleep 10
          done
          echo "::error::New API revision did not reach Running state within 120 s"
          exit 1

      - name: Wait for new frontend revision to be running
        run: |
          REV="${{ steps.new-client-revision.outputs.revision }}"
          APP="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "Waiting for revision ${REV} to reach Running state..."
          for i in $(seq 1 12); do
            STATE=$(az containerapp revision show \
              --name "${APP}" --resource-group "${RG}" --revision "${REV}" \
              --query "properties.runningState" --output tsv 2>/dev/null || echo "Unavailable")
            echo "  Attempt ${i}/12 — state: ${STATE}"
            if [[ "${STATE}" == "Running" ]]; then
              echo "Revision is Running."
              exit 0
            fi
            sleep 10
          done
          echo "::error::New frontend revision did not reach Running state within 120 s"
          exit 1

      # ── Phase 4: Smoke-test new revisions before shifting traffic ──────────
      # Each revision in a Multiple-revision Container App has its own
      # hostname: https://<revision-name>.<env-domain>.
      # We retrieve the revision-specific FQDN and verify the health endpoint
      # before any live traffic is redirected to the new revision.
      - name: Smoke test — new API revision health check
        run: |
          APP="ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          REV="${{ steps.new-api-revision.outputs.revision }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          # Derive the revision-specific URL from the Container App's main FQDN.
          # Main FQDN:     <app-name>.<env-domain>
          # Revision FQDN: <revision-name>.<env-domain>
          MAIN_FQDN=$(az containerapp show \
            --name "${APP}" --resource-group "${RG}" \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          ENV_DOMAIN="${MAIN_FQDN#*.}"
          REV_URL="https://${REV}.${ENV_DOMAIN}"
          echo "Smoke-testing new API revision at ${REV_URL}/health ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${REV_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "New API revision health check passed (HTTP 200)"
              exit 0
            fi
            echo "  Attempt ${i}/6 — HTTP ${STATUS}, retrying in 10 s..."
            sleep 10
          done
          echo "::error::New API revision health check failed after 60 s"
          exit 1

      # Derive the new frontend revision's revision-specific URL so Playwright
      # can target it directly while the old revision still carries all traffic.
      - name: Derive new frontend revision URL
        id: new-client-rev-url
        run: |
          APP="ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}"
          REV="${{ steps.new-client-revision.outputs.revision }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          MAIN_FQDN=$(az containerapp show \
            --name "${APP}" --resource-group "${RG}" \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          ENV_DOMAIN="${MAIN_FQDN#*.}"
          REV_URL="https://${REV}.${ENV_DOMAIN}"
          echo "New frontend revision URL: ${REV_URL}"
          echo "url=${REV_URL}" >> "$GITHUB_OUTPUT"

      # ── Phase 5: E2E gate — Playwright tests against new revision ─────────
      # Tests run directly against the new frontend revision's revision-specific
      # URL while 100 % of live traffic still goes to the old revisions.
      # Users are never exposed to the candidate revision during the gate.
      # continue-on-error allows the promote/rollback steps to always execute.

      # MSAL uses window.location.origin as redirectUri, so the revision-specific
      # origin must be registered as an Azure AD SPA redirect URI before sign-in
      # will succeed.  We add it here and remove it again after tests complete
      # (see "Remove revision URL from Azure AD SPA redirect URIs" below).
      # The CD service principal must be an owner of the API app registration —
      # bootstrap.sh ensures this by calling `az ad app owner add`.
      - name: Add revision URL to Azure AD SPA redirect URIs
        id: add-redirect-uri
        run: |
          CLIENT_ID="${{ vars.API_AZURE_CLIENT_ID }}"
          REV_URL="${{ steps.new-client-rev-url.outputs.url }}"
          # Read the current SPA redirect URI list and append the revision URL.
          CURRENT=$(az ad app show --id "${CLIENT_ID}" \
            --query "spa.redirectUris" --output json 2>/dev/null || echo "[]")
          # Build updated list as a bash array (redirect URIs are valid URLs and
          # never contain spaces, so newline-split word expansion is safe).
          mapfile -t UPDATED < <(echo "${CURRENT}" | \
            jq -r --arg url "${REV_URL}" '(. // []) + [$url] | unique | .[]')
          az ad app update --id "${CLIENT_ID}" \
            --spa-redirect-uris "${UPDATED[@]}" \
            --output none
          echo "Added ${REV_URL} to SPA redirect URIs."

      - name: Install client dependencies (E2E)
        working-directory: client
        run: npm ci

      # Decode the pre-authenticated Playwright storage state when available.
      # Preferred for production tenants that enforce MFA or Conditional Access.
      # When the secret is absent the step is a no-op and global-setup falls
      # back to the headless username/password path.
      - name: Restore pre-authenticated Playwright state
        env:
          PLAYWRIGHT_AUTH_STATE_B64: ${{ secrets.PLAYWRIGHT_AUTH_STATE_B64 }}
        working-directory: client
        run: |
          if [ -n "$PLAYWRIGHT_AUTH_STATE_B64" ]; then
            mkdir -p e2e/.auth
            printf '%s' "$PLAYWRIGHT_AUTH_STATE_B64" | base64 -d > e2e/.auth/injected.json
            echo "PLAYWRIGHT_AUTH_STATE_FILE=${{ github.workspace }}/client/e2e/.auth/injected.json" >> "$GITHUB_ENV"
            echo "Pre-authenticated state restored — headless sign-in will be skipped."
          else
            echo "PLAYWRIGHT_AUTH_STATE_B64 not set — will attempt headless sign-in."
          fi

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against new revision (0 % live traffic)
        id: e2e
        continue-on-error: true
        working-directory: client
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: ${{ steps.new-client-rev-url.outputs.url }}
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JUnit XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: client/test-results/e2e.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload screenshots on failure
        if: steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: client/test-results/
          retention-days: 7
          if-no-files-found: ignore

      # Remove the revision-specific URL that was registered before E2E tests.
      # Runs unconditionally (always()) so it cleans up on both success and failure.
      # The step is intentionally non-fatal (set +e +o pipefail) so that a cleanup
      # failure never prevents the promote/rollback phases from running.
      - name: Remove revision URL from Azure AD SPA redirect URIs
        if: always()
        run: |
          # Disable bash -e / pipefail: errors emit warnings but never fail the job.
          set +e +o pipefail

          CLIENT_ID="${{ vars.API_AZURE_CLIENT_ID }}"
          REV_URL="${{ steps.new-client-rev-url.outputs.url }}"
          CLEANUP_ERROR=0

          CURRENT=$(az ad app show --id "${CLIENT_ID}" \
            --query "spa.redirectUris" --output json 2>/dev/null)
          if [[ $? -ne 0 || -z "${CURRENT}" ]]; then
            echo "::warning::Failed to query SPA redirect URIs for app ${CLIENT_ID}; skipping cleanup of ${REV_URL}."
            CLEANUP_ERROR=1
          fi

          if [[ ${CLEANUP_ERROR} -eq 0 ]]; then
            # Build the remaining list, excluding the revision URL.
            # Capture jq output separately so its exit code is checkable.
            REMAINING_RAW=$(echo "${CURRENT}" | \
              jq -r --arg url "${REV_URL}" '(. // []) | [.[] | select(. != $url)] | .[]')
            if [[ $? -ne 0 ]]; then
              echo "::warning::Failed to compute remaining SPA redirect URIs for app ${CLIENT_ID}; skipping cleanup of ${REV_URL}."
              CLEANUP_ERROR=1
            fi
          fi

          if [[ ${CLEANUP_ERROR} -eq 0 ]]; then
            if [[ -n "${REMAINING_RAW}" ]]; then
              # Convert newline-separated output into an array for az CLI.
              mapfile -t REMAINING <<< "${REMAINING_RAW}"
              az ad app update --id "${CLIENT_ID}" \
                --spa-redirect-uris "${REMAINING[@]}" \
                --output none \
                || echo "::warning::Could not remove ${REV_URL} from SPA redirect URIs on app ${CLIENT_ID} — remove manually."
              echo "Removed ${REV_URL} from SPA redirect URIs."
            else
              echo "::warning::No other SPA redirect URIs remain for app ${CLIENT_ID}; skipping update to avoid clearing all URIs."
              echo "::warning::The revision URL ${REV_URL} was not removed — investigate why no non-revision redirect URIs are configured."
            fi
          else
            echo "::warning::Skipped or partially failed cleanup of SPA redirect URIs for app ${CLIENT_ID}; promote/rollback will still run."
          fi

          # Always exit 0 so this cleanup step never blocks promote/rollback.
          exit 0

      # ── Phase 6a: Promote — E2E passed ────────────────────────────────────
      # Shift 100 % live traffic to the new revisions, then deactivate the old
      # ones.  Traffic is only moved after the E2E gate passes.
      - name: Promote — shift traffic to new API revision
        if: steps.e2e.outcome == 'success'
        run: |
          echo "E2E passed — shifting 100 % traffic to new API revision: ${{ steps.new-api-revision.outputs.revision }}"
          az containerapp ingress traffic set \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision-weight "${{ steps.new-api-revision.outputs.revision }}=100" \
            --output none

      - name: Promote — shift traffic to new frontend revision
        if: steps.e2e.outcome == 'success'
        run: |
          echo "E2E passed — shifting 100 % traffic to new frontend revision: ${{ steps.new-client-revision.outputs.revision }}"
          az containerapp ingress traffic set \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision-weight "${{ steps.new-client-revision.outputs.revision }}=100" \
            --output none

      - name: Promote — deactivate old API revision
        if: steps.e2e.outcome == 'success'
        run: |
          OLD_REV="${{ steps.old-revisions.outputs.api }}"
          echo "Deactivating old API revision: ${OLD_REV}"
          az containerapp revision deactivate \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision "${OLD_REV}" \
            --output none \
            || echo "::warning::Could not deactivate old API revision ${OLD_REV} — it may already be inactive."

      - name: Promote — deactivate old frontend revision
        if: steps.e2e.outcome == 'success'
        run: |
          OLD_REV="${{ steps.old-revisions.outputs.client }}"
          echo "Deactivating old frontend revision: ${OLD_REV}"
          az containerapp revision deactivate \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision "${OLD_REV}" \
            --output none \
            || echo "::warning::Could not deactivate old frontend revision ${OLD_REV} — it may already be inactive."

      # ── Phase 6b: Rollback — E2E failed ───────────────────────────────────
      # Because live traffic never moved to the new revisions, no traffic
      # restore is required.  Simply deactivate the new revisions so they stop
      # consuming resources, then fail the job.
      - name: Rollback — deactivate new API revision
        if: steps.e2e.outcome == 'failure'
        run: |
          NEW_REV="${{ steps.new-api-revision.outputs.revision }}"
          echo "E2E failed — deactivating new API revision: ${NEW_REV}"
          az containerapp revision deactivate \
            --name "ca-nova-circle-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision "${NEW_REV}" \
            --output none \
            || echo "::warning::Could not deactivate new API revision ${NEW_REV} — manual cleanup may be required."

      - name: Rollback — deactivate new frontend revision
        if: steps.e2e.outcome == 'failure'
        run: |
          NEW_REV="${{ steps.new-client-revision.outputs.revision }}"
          echo "E2E failed — deactivating new frontend revision: ${NEW_REV}"
          az containerapp revision deactivate \
            --name "ca-nova-circle-client-${{ vars.AZURE_ENVIRONMENT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --revision "${NEW_REV}" \
            --output none \
            || echo "::warning::Could not deactivate new frontend revision ${NEW_REV} — manual cleanup may be required."

      - name: Fail — E2E tests did not pass
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "::error::E2E tests failed. New revisions have been deactivated; old revisions continue to serve all traffic."
          exit 1
